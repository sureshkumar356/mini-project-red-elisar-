  <script>
    (function () {
      window.__redAgentBoot = { mounted: false, errors: [] };

      function esc(v) {
        return String(v || "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;");
      }

      function renderBootError(message) {
        const root = document.getElementById("root");
        if (!root) return;
        root.innerHTML =
          '<div style="min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px;background:#f4f7fd;">' +
            '<div style="max-width:860px;width:100%;background:#fff;border:1px solid #f2c5d0;border-radius:16px;box-shadow:0 12px 28px rgba(214,59,92,.15);padding:22px;font-family:Manrope,ui-sans-serif,system-ui,sans-serif;">' +
              '<h2 style="margin:0 0 8px;color:#b42346;font-size:22px;font-weight:800;">Red Agent frontend failed to initialize</h2>' +
              '<p style="margin:0 0 14px;color:#5d6b87;font-size:14px;">This is a JavaScript startup error (not a Flask backend crash). Please hard refresh (Ctrl+F5). If it persists, share the message below.</p>' +
              '<pre style="margin:0;background:#fff5f7;border:1px solid #f6d2db;border-radius:10px;padding:12px;color:#9f1239;font-size:12px;white-space:pre-wrap;">' + esc(message) + '</pre>' +
            '</div>' +
          '</div>';
      }

      window.__renderRedAgentBootError = renderBootError;

      window.addEventListener("error", function (event) {
        const target = event && event.target;
        if (target && target.tagName === "SCRIPT") {
          const src = target.getAttribute("src") || "(inline script)";
          renderBootError("Failed to load script: " + src);
          return;
        }
        const msg = (event && event.message) || "Unknown runtime error";
        const file = event && event.filename ? "\nFile: " + event.filename + ":" + event.lineno + ":" + event.colno : "";
        renderBootError(msg + file);
      }, true);

      window.addEventListener("unhandledrejection", function (event) {
        const reason = event && event.reason ? (event.reason.stack || event.reason.message || String(event.reason)) : "Unknown promise rejection";
        renderBootError("Unhandled Promise rejection:\n" + reason);
      });

      setTimeout(function () {
        if (!window.__redAgentBoot || !window.__redAgentBoot.mounted) {
          renderBootError("App mount timeout: React app did not mount within expected time. Check blocked CDN scripts, browser extensions, or network restrictions.");
        }
      }, 20000);
    })();
  </script>

    function useAnimatedNumber(value, duration = 900) {
      const [display, setDisplay] = useState(0);

      const cols = 3;

      const cardH = 198;
      const gapX = 56;
      const gapY = 84;
      const marginX = 38;
      const marginY = 44;
      const rows = Math.max(1, Math.ceil(steps.length / cols));
      const nodes = steps.map((step, idx) => {
        const row = Math.floor(idx / cols);
        const colInRow = idx % cols;
        const reversed = row % 2 === 1;
        const col = reversed ? (cols - 1 - colInRow) : colInRow;
        return {
          ...step,
          x: marginX + col * (cardW + gapX),
          y: marginY + row * (cardH + gapY),
          w: cardW,
          h: cardH,
        };
      });
      const width = marginX * 2 + cols * cardW + (cols - 1) * gapX;
      const height = marginY * 2 + rows * cardH + (rows - 1) * gapY + 18;

        const adjusted = Number(result?.what_if_simulation?.global_metrics?.best_attack_path_probability || 0) || Math.max(0.2, base - 0.12);

                          </div>
                        </div>
                      )}
                    </div>
                  </div>

                  {(active === "fullscan" || vulns.length > 0 || isLoading) && (
                    <VulnerabilityList vulns={vulns} isLoading={isLoading} selectedKey={selectedVulnKey} onSelect={setSelectedVulnKey} />
                  )}

                  <div className="glass rounded-2xl p-4">
                    <h3 className="text-sm font-bold text-slate-800">Reports</h3>
                    <p className="text-xs text-slate-500 mt-1">Download-ready artifacts generated from active run.</p>
                    <div className="mt-3 space-y-2">
                      {reportCards.map((r) => (
                        <motion.div key={r.key} whileHover={{ y: -2 }} className="rounded-xl border border-slate-200 bg-white p-3">
                          <div className="flex items-start justify-between gap-2">
                            <div>
                              <p className="text-sm font-semibold text-slate-800">{r.title}</p>
                              <p className="text-xs text-slate-500 mt-1 break-all">{reportDisplay(r.value)}</p>
                            </div>
                            <button
                              onClick={() => handleReportAction(r.value)}
                              disabled={!r.value || r.value === "Not generated"}
                              className="text-xs px-2 py-1 rounded-lg border border-slate-200 bg-slate-50 hover:bg-white disabled:opacity-50 disabled:cursor-not-allowed"
                            >
                              {/^https?:\/\//i.test(r.value || "") ? "Open" : "Download"}
                            </button>
                          </div>
                        </motion.div>
                      ))}
                    </div>
                  </div>
                </div>
              </section>

              <section id="settings" className="mt-5 grid grid-cols-1 xl:grid-cols-3 gap-4">
                <div className="xl:col-span-2 glass rounded-2xl p-4">
                  <h3 className="text-base font-bold text-slate-800">Settings</h3>
                  <p className="text-xs text-slate-500 mt-1">Customize the interface and view preferences.</p>

                  <div className="mt-4 grid md:grid-cols-2 gap-3">
                    <div className="rounded-xl border border-slate-200 bg-white p-3">
                      <p className="text-xs font-semibold text-slate-600">Theme</p>
                      <select
                        value={lightTheme}
                        onChange={(e) => setLightTheme(e.target.value)}
                        className="mt-2 w-full rounded-lg border border-slate-200 bg-white px-2.5 py-2 text-sm"
                      >
                        <option value="frost">Frost (Light)</option>
                        <option value="pearl">Pearl (Light)</option>
                        <option value="night">Night (Dark)</option>
                      </select>
                    </div>

                    <div className="rounded-xl border border-slate-200 bg-white p-3">
                      <p className="text-xs font-semibold text-slate-600">Accent</p>
                      <div className="mt-2 flex gap-2">
                        <button
                          onClick={() => setAccentMode("blue")}
                          className={`px-3 py-2 rounded-lg text-xs font-semibold border ${accentMode === "blue" ? "bg-cyber-600 text-white border-cyber-700" : "bg-white border-slate-200 text-slate-600"}`}
                        >
                          Blue
                        </button>
                        <button
                          onClick={() => setAccentMode("red")}
                          className={`px-3 py-2 rounded-lg text-xs font-semibold border ${accentMode === "red" ? "bg-rose-600 text-white border-rose-700" : "bg-white border-slate-200 text-slate-600"}`}
                        >
                          Red
                        </button>
                      </div>
                    </div>
                  </div>
                </div>

                <div className="glass rounded-2xl p-4">
                  <h3 className="text-sm font-bold text-slate-800">Quick Actions</h3>
                  <p className="text-xs text-slate-500 mt-1">Reset UI preferences and zoom.</p>
                  <div className="mt-3 space-y-2">
                    <button
                      onClick={() => {
                        setLightTheme("frost");
                        setAccentMode("blue");
                      }}
                      className="w-full rounded-xl py-2 text-sm font-semibold bg-white border border-slate-200 hover:shadow-sm"
                    >
                      Reset Theme
                    </button>
                    <button
                      onClick={() => {
                        const el = document.getElementById("attack-graph");
                        if (el) {
                          el.scrollIntoView({ behavior: "smooth", block: "start" });
                        }
                      }}
                      className="w-full rounded-xl py-2 text-sm font-semibold bg-slate-900 text-white hover:bg-slate-800"
                    >
                      Jump to Graph
                    </button>
                  </div>
                </div>
              </section>

            </main>
          </div>

          <AnimatePresence>
            {isLoading && (
              <motion.div
                initial={{ opacity: 0 }}
                animate={{ opacity: 1 }}
                exit={{ opacity: 0 }}
                className="fixed inset-0 bg-white/55 backdrop-blur-[2px] z-50 flex items-center justify-center"
              >
                <motion.div
                  initial={{ y: 8, scale: 0.96 }}
                  animate={{ y: 0, scale: 1 }}
                  className="glass rounded-2xl px-5 py-4"
                >
                  <p className="text-sm font-semibold text-slate-700">Running {activeOperationLabel || "AI security"} pipeline...</p>
                  <p className="text-xs text-slate-500 mt-1">{progressMessage}</p>
                  <div className="mt-3 h-2.5 w-64 rounded-full bg-slate-100 overflow-hidden">
                    <motion.div
                      initial={{ x: "-100%" }}
                      animate={{ x: "100%" }}
                      transition={{ duration: 1.1, repeat: Infinity, ease: "linear" }}
                      className="h-full w-1/2 bg-gradient-to-r from-cyber-500 via-cyber-300 to-emerald-400"
                    ></motion.div>
                  </div>
                  <button onClick={cancelRunningRequest} className="mt-3 w-full rounded-lg border border-slate-300 bg-white px-3 py-1.5 text-xs font-semibold text-slate-700 hover:shadow-sm">
                    Cancel Request
                  </button>
                </motion.div>
              </motion.div>
            )}
          </AnimatePresence>
        </div>
      );
    }

    class ErrorBoundary extends React.Component {
      constructor(props) {
        super(props);
        this.state = { hasError: false, error: null };
      }

      static getDerivedStateFromError(error) {
        return { hasError: true, error };
      }

      componentDidCatch(error, info) {
        console.error("Red Agent UI runtime error:", error, info);
      }

      render() {
        if (this.state.hasError) {
          return (
            <div className="min-h-screen flex items-center justify-center p-6" style={{ background: "#f4f7fd" }}>
              <div className="max-w-2xl w-full rounded-2xl border border-red-200 bg-white shadow-xl p-6">
                <h1 className="text-xl font-extrabold text-red-700">Red Agent UI failed to load</h1>
                <p className="mt-2 text-sm text-slate-600">A browser runtime error occurred. Open Developer Tools (F12) and check the console for details.</p>
                <pre className="mt-3 text-xs bg-red-50 border border-red-100 text-red-700 rounded-lg p-3 overflow-auto">
                  {String(this.state.error && this.state.error.message ? this.state.error.message : this.state.error)}
                </pre>
              </div>
            </div>
          );
        }
        return this.props.children;
      }
    }

    ReactDOM.createRoot(document.getElementById("root")).render(
      <ErrorBoundary>
        <App />
      </ErrorBoundary>
    );
    if (window.__redAgentBoot) {
      window.__redAgentBoot.mounted = true;
    }
  </script>
  {% endraw %}
</body>
</html>
